<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noorwegen 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fjord: #1a3a4a;
    --fjord-mid: #2a5568;
    --glacier: #e8f4f8;
    --snow: #f8fbfc;
    --moss: #4a7c59;
    --gold: #c8973a;
    --rock: #6b7280;
    --ink: #1a2332;
    --sidebar-w: 280px;
    --sidebar-w-collapsed: 0px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--snow); color: var(--ink); overflow-x: hidden; }

  /* SIDEBAR */
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--fjord); z-index: 100; display: flex; flex-direction: column; transform: translateX(0); transition: transform .35s cubic-bezier(.4,0,.2,1); overflow: hidden; }
  .sidebar.collapsed { transform: translateX(-100%); }
  .sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0; }
  .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; letter-spacing: .5px; line-height: 1.3; }
  .sidebar-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 4px; font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  .view-toggle { display: flex; margin: 16px 24px 0; background: rgba(255,255,255,.08); border-radius: 8px; padding: 3px; }
  .vt-btn { flex: 1; border: none; background: transparent; color: rgba(255,255,255,.5); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .8px; text-transform: uppercase; padding: 7px 4px; border-radius: 6px; cursor: pointer; transition: all .2s; }
  .vt-btn.active { background: var(--gold); color: var(--fjord); font-weight: 500; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0 24px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent; }
  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 4px; }
  .nav-phase { padding: 18px 24px 6px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); opacity: .8; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 24px; cursor: pointer; transition: background .15s; border-left: 3px solid transparent; text-decoration: none; }
  .nav-item:hover { background: rgba(255,255,255,.05); }
  .nav-item.active { background: rgba(200,151,58,.12); border-left-color: var(--gold); }
  .nav-day-num { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(255,255,255,.3); width: 18px; flex-shrink: 0; }
  .nav-item.active .nav-day-num { color: var(--gold); }
  .nav-date { font-size: 12px; color: rgba(255,255,255,.75); font-weight: 400; white-space: nowrap; }
  .nav-item.active .nav-date { color: #fff; font-weight: 500; }
  .nav-loc { font-size: 10px; color: rgba(255,255,255,.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dest-group { padding: 8px 16px; }
  .dest-btn { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: transparent; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: background .15s; border-left: 3px solid transparent; }
  .dest-btn:hover { background: rgba(255,255,255,.06); }
  .dest-btn.active { background: rgba(200,151,58,.12); border-left-color: var(--gold); }
  .dest-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dest-name { font-size: 13px; color: rgba(255,255,255,.8); font-weight: 500; }
  .dest-btn.active .dest-name { color: #fff; }
  .dest-dates { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,.3); margin-top: 2px; }

  /* HAMBURGER */
  .hamburger { position: fixed; top: 20px; left: 20px; z-index: 200; width: 44px; height: 44px; border-radius: 10px; border: none; background: var(--fjord); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; transition: all .2s; box-shadow: 0 4px 16px rgba(26,58,74,.3); }
  .hamburger.open { background: var(--fjord-mid); left: calc(var(--sidebar-w) + 12px); }
  .hamburger span { display: block; width: 18px; height: 2px; background: #fff; border-radius: 2px; transition: all .25s; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* MAIN */
  .main { margin-left: var(--sidebar-w); min-height: 100vh; transition: margin-left .35s cubic-bezier(.4,0,.2,1); }
  .main.expanded { margin-left: 0; }
  .day-page { display: none; }
  .day-page.active { display: block; }

  /* HERO */
  .hero { position: relative; height: 480px; overflow: hidden; }
  .hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center; transition: transform 8s ease; }
  .hero:hover .hero-img { transform: scale(1.04); }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(26,50,66,.15) 0%, rgba(26,50,66,.05) 40%, rgba(26,50,66,.6) 75%, rgba(26,50,66,.9) 100%); }
  .hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 56px 40px; }
  .hero-day-label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .hero-place { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); color: #fff; line-height: 1.1; text-shadow: 0 2px 20px rgba(0,0,0,.3); }
  .hero-phase-badge { display: inline-block; margin-top: 14px; padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: .5px; }

  /* HERO NEXT */
  .hero-next { position: absolute; bottom: 40px; right: 48px; display: flex; align-items: center; gap: 7px; color: rgba(255,255,255,.8); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border: none; background: rgba(255,255,255,.1); backdrop-filter: blur(8px); padding: 8px 16px 8px 14px; border-radius: 24px; border: 1px solid rgba(255,255,255,.25); transition: all .2s; }
  .hero-next:hover { background: rgba(255,255,255,.22); color: #fff; border-color: rgba(255,255,255,.5); transform: translateX(3px); }
  .hero-next svg { transition: transform .2s; }
  .hero-next:hover svg { transform: translateX(3px); }

  /* DAY CONTENT */
  .day-content { max-width: 860px; padding: 48px 56px 80px; }
  .accom-card { background: #fff; border-radius: 16px; padding: 28px 32px; margin-bottom: 40px; box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.05); border: 1px solid rgba(0,0,0,.06); display: flex; gap: 20px; align-items: flex-start; }
  .accom-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .accom-body {}
  .accom-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--fjord); text-decoration: none; display: inline-block; border-bottom: 2px solid transparent; transition: border-color .2s; line-height: 1.3; }
  .accom-name:hover { border-bottom-color: var(--gold); }
  .accom-type { font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; text-transform: uppercase; color: var(--rock); margin-bottom: 6px; }
  .accom-address { margin-top: 8px; font-size: 13px; color: var(--rock); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: color .2s; }
  .accom-address:hover { color: var(--fjord); }
  .accom-address svg { flex-shrink: 0; }
  .journey-card { background: var(--fjord); border-radius: 16px; padding: 28px 32px; margin-bottom: 40px; color: #fff; display: flex; gap: 20px; align-items: center; }
  .journey-icon { font-size: 36px; flex-shrink: 0; }
  .section-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
  .activities-block { margin-bottom: 36px; }
  .activity-text { font-size: 16px; line-height: 1.75; color: var(--ink); font-weight: 300; }
  .activity-text strong { color: var(--fjord); font-weight: 500; }
  .more-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; padding: 11px 20px; border-radius: 8px; background: var(--glacier); color: var(--fjord); text-decoration: none; font-size: 13px; font-weight: 500; transition: all .2s; border: 1px solid rgba(26,58,74,.08); }
  .more-link:hover { background: var(--fjord); color: #fff; }
  .booked-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; padding: 4px 10px; border-radius: 20px; background: rgba(74,124,89,.1); color: var(--moss); font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .travel-strip { display: flex; gap: 20px; margin-bottom: 36px; flex-wrap: wrap; }
  .travel-chip { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #fff; border-radius: 10px; border: 1px solid rgba(0,0,0,.07); font-size: 13px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .travel-chip-icon { font-size: 16px; }
  .travel-chip-label { color: var(--rock); font-size: 11px; display: block; }
  .travel-chip-val { color: var(--ink); font-weight: 500; }
  .divider { height: 1px; background: rgba(0,0,0,.07); margin: 36px 0; }

  /* BOTTOM NEXT */
  .day-next-wrap { margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(0,0,0,.07); display: flex; justify-content: flex-end; }
  .day-next { display: inline-flex; align-items: center; gap: 12px; padding: 14px 24px; background: var(--fjord); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: all .2s; text-align: left; }
  .day-next:hover { background: var(--fjord-mid); transform: translateX(4px); }
  .day-next svg { flex-shrink: 0; transition: transform .2s; }
  .day-next:hover svg { transform: translateX(3px); }
  .day-next-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.45); display: block; margin-bottom: 3px; }
  .day-next-dest { font-size: 13px; color: #fff; font-weight: 500; display: block; }

  /* OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; }
  .overlay.show { display: block; }

  /* PHASE COLORS */
  .phase-reis   { background: #607d8b; }
  .phase-bergen { background: #1565c0; }
  .phase-bald   { background: #2e7d32; }
  .phase-vik    { background: #6a1b9a; }
  .phase-flam   { background: #1976d2; }
  .phase-oslo   { background: #bf360c; }
  .badge-reis   { background: rgba(96,125,139,.15);  color: #546e7a; }
  .badge-bergen { background: rgba(21,101,192,.12);  color: #0d47a1; }
  .badge-bald   { background: rgba(46,125,50,.12);   color: #1b5e20; }
  .badge-vik    { background: rgba(106,27,154,.12);  color: #4a148c; }
  .badge-flam   { background: rgba(25,118,210,.12);  color: #0d47a1; }
  .badge-oslo   { background: rgba(191,54,12,.12);   color: #bf360c; }

  /* LANDING PAGE */
  .landing-page { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
  .landing-page.hidden { pointer-events: none; opacity: 0; transition: opacity .8s ease; }
  .landing-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; transform: scale(1.06); animation: landingZoom 12s ease forwards; }
  @keyframes landingZoom { from { transform: scale(1.06); } to { transform: scale(1.0); } }
  .landing-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(10,25,35,.55) 0%, rgba(10,25,35,.2) 50%, rgba(10,25,35,.7) 100%); }
  .landing-content { position: relative; text-align: center; padding: 40px; animation: landingFadeUp .9s ease .3s both; }
  @keyframes landingFadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .landing-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; opacity: .9; }
  .landing-title { font-family: 'Playfair Display', serif; font-size: clamp(64px, 12vw, 120px); color: #fff; line-height: 1; letter-spacing: -1px; text-shadow: 0 4px 40px rgba(0,0,0,.4); }
  .landing-sub { margin-top: 20px; font-size: 15px; color: rgba(255,255,255,.65); font-weight: 300; letter-spacing: .5px; }
  .landing-cta { margin-top: 48px; display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; border: 1.5px solid rgba(255,255,255,.35); border-radius: 40px; color: #fff; font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Mono', monospace; backdrop-filter: blur(8px); background: rgba(255,255,255,.08); transition: all .25s; animation: landingFadeUp .9s ease .7s both; }
  .landing-cta:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.6); }
  .landing-cta svg { animation: bounce 1.8s ease infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }

  @media (max-width: 768px) {
    .sidebar { width: 100%; max-width: 320px; }
    .sidebar.collapsed { transform: translateX(-100%); }
    .hamburger.open { left: calc(320px + 12px); }
    .main { margin-left: 0 !important; }
    .hero { height: 360px; }
    .hero-content { padding: 0 28px 28px; }
    .hero-next { right: 20px; bottom: 20px; font-size: 10px; padding: 7px 13px; }
    .day-content { padding: 32px 28px 60px; }
    .accom-card { flex-direction: column; }
    .journey-card { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>

<div class="landing-page" id="landing" onclick="enterSite()">
  <img class="landing-bg" src="images/noorwegen.jpg" alt="Noorwegen" onerror="this.src='images/Bjornafjorden.png'">
  <div class="landing-overlay"></div>
  <div class="landing-content">
    <div class="landing-eyebrow">Zomer 2026 &nbsp;·&nbsp; 3 personen</div>
    <div class="landing-title">Noorwegen</div>
    <div class="landing-sub">4 juli – 26 juli &nbsp;·&nbsp; Bergen · Baldersheim · Vik · Flåm · Oslo</div>
    <div class="landing-cta">
      Begin de reis
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Noorwegen<br><em style="font-style:italic;color:rgba(255,255,255,.6)">Zomer 2026</em></div>
    <div class="sidebar-sub">4 jul – 26 jul · 3 personen</div>
  </div>
  <div style="padding:12px 16px 0;">
    <div class="view-toggle">
      <button class="vt-btn active" id="btn-dates" onclick="switchView('dates')">Data</button>
      <button class="vt-btn" id="btn-dests" onclick="switchView('dests')">Bestemmingen</button>
    </div>
  </div>
  <div class="sidebar-nav" id="view-dates"></div>
  <div class="sidebar-nav" id="view-dests" style="display:none;"></div>
</nav>

<main class="main" id="main"></main>

<script>
let days = [];
let destinations = [];
let phaseGroups = [];

let currentDay = 0;
let sidebarOpen = false;
let currentView = "dates";

function enterSite() {
  const landing = document.getElementById("landing");
  landing.classList.add("hidden");
  setTimeout(() => landing.style.display = "none", 800);
}

function buildSidebar() {
  const datesEl = document.getElementById("view-dates");
  datesEl.innerHTML = "";
  phaseGroups.forEach(group => {
    const phase = document.createElement("div");
    phase.className = "nav-phase";
    phase.textContent = group.label;
    datesEl.appendChild(phase);
    group.days.forEach(di => {
      const d = days[di];
      const item = document.createElement("a");
      item.className = "nav-item" + (di === currentDay ? " active" : "");
      item.id = "nav-" + di;
      item.href = "#";
      item.onclick = (e) => { e.preventDefault(); goToDay(di); if (window.innerWidth < 768) closeSidebar(); };
      item.innerHTML = `<span class="nav-day-num">${di + 1}</span><div><div class="nav-date">${d.date}</div><div class="nav-loc">${d.place}</div></div>`;
      datesEl.appendChild(item);
    });
  });

  const destsEl = document.getElementById("view-dests");
  destsEl.innerHTML = "";
  destinations.forEach(dest => {
    const group = document.createElement("div");
    group.className = "dest-group";
    const btn = document.createElement("button");
    btn.className = "dest-btn" + (days[currentDay].phase === dest.id ? " active" : "");
    btn.id = "dest-" + dest.id;
    btn.onclick = () => { goToDay(dest.firstDay); if (window.innerWidth < 768) closeSidebar(); };
    btn.innerHTML = `<span class="dest-dot ${dest.dotClass}"></span><div><div class="dest-name">${dest.label}</div><div class="dest-dates">${dest.dates}</div></div>`;
    group.appendChild(btn);
    destsEl.appendChild(group);
  });
}

function buildMain() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  days.forEach((d, i) => {
    const page = document.createElement("div");
    page.className = "day-page" + (i === currentDay ? " active" : "");
    page.id = "day-" + i;

    // Accommodation
    let accomHTML = "";
    if (d.accom) {
      const nameLink = d.accom.url
        ? `<a href="${d.accom.url}" target="_blank" rel="noopener" class="accom-name">${d.accom.name}</a>`
        : `<span class="accom-name" style="cursor:default;">${d.accom.name}</span>`;
      const addrLink = d.accom.mapsUrl
        ? `<a href="${d.accom.mapsUrl}" target="_blank" rel="noopener" class="accom-address"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${d.accom.address}</a>`
        : `<span class="accom-address">${d.accom.address}</span>`;
      const bookedBadge = d.accom.booked ? `<div class="booked-badge">✓ Geboekt</div>` : "";
      if (d.isTravel && d.accom.icon === "⛴️") {
        accomHTML = `<div class="journey-card"><div class="journey-icon">${d.accom.icon}</div><div><div class="accom-type">${d.accom.type}</div>${nameLink}${addrLink}${bookedBadge}</div></div>`;
      } else {
        accomHTML = `<div class="accom-card"><div class="accom-icon" style="background:${phaseIconBg(d.phase)}">${d.accom.icon}</div><div class="accom-body"><div class="accom-type">${d.accom.type}</div>${nameLink}${addrLink}${bookedBadge}</div></div>`;
      }
    }

    // Travel chip
    let travelHTML = "";
    if (d.isTravel && d.travelTime) {
      const linkPart = d.travelLink
        ? `<a href="${d.travelLink}" target="_blank" rel="noopener" style="color:var(--fjord);font-weight:500;">${d.travelTime}</a>`
        : `<span class="travel-chip-val">${d.travelTime}</span>`;
      travelHTML = `<div class="travel-strip"><div class="travel-chip"><span class="travel-chip-icon">${d.travelIcon}</span><div><span class="travel-chip-label">Reistijd</span>${linkPart}</div></div></div>`;
    }

    // More link
    const moreLinkHTML = d.moreLink
      ? `<a href="${d.moreLink}" target="_blank" rel="noopener" class="more-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Meer activiteiten</a>`
      : "";

    // ── Next buttons ──────────────────────────────────────────────
    const isLast = i === days.length - 1;
    const nextDay = isLast ? null : days[i + 1];

    const heroNextHTML = isLast ? "" : `
      <button class="hero-next" onclick="goToDay(${i + 1})">
        Volgende
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>`;

    const bottomNextHTML = isLast ? "" : `
      <div class="day-next-wrap">
        <button class="day-next" onclick="goToDay(${i + 1}); window.scrollTo({top:0,behavior:'smooth'})">
          <div>
            <span class="day-next-label">Volgende dag</span>
            <span class="day-next-dest">${nextDay.date} &nbsp;·&nbsp; ${nextDay.place}</span>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>`;

    page.innerHTML = `
      <div class="hero">
        <img class="hero-img" src="${d.heroImage}" alt="${d.heroAlt}" loading="${i === 0 ? 'eager' : 'lazy'}">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="hero-day-label">Dag ${i + 1} &nbsp;·&nbsp; ${d.weekday} ${d.dateShort}</div>
          <div class="hero-place">${d.place}</div>
          <span class="hero-phase-badge badge-${d.phase}">${d.phaseLabel}</span>
        </div>
        ${heroNextHTML}
      </div>
      <div class="day-content">
        ${travelHTML}
        ${accomHTML}
        ${d.accom ? '<div class="divider"></div>' : ''}
        <div class="activities-block">
          <div class="section-title">Programma</div>
          <p class="activity-text">${d.activities}</p>
          ${moreLinkHTML}
        </div>
        ${bottomNextHTML}
      </div>`;

    main.appendChild(page);
  });
}

function phaseIconBg(phase) {
  const map = { reis:"#f0f4f8", bergen:"#e3f0fd", bald:"#e8f5e9", vik:"#f3e5f5", flam:"#e3f2fd", oslo:"#fbe9e7" };
  return map[phase] || "#f0f4f8";
}

function goToDay(i) {
  document.getElementById("day-" + currentDay)?.classList.remove("active");
  document.getElementById("day-" + i)?.classList.add("active");
  document.getElementById("nav-" + currentDay)?.classList.remove("active");
  const nextNav = document.getElementById("nav-" + i);
  nextNav?.classList.add("active");
  document.querySelectorAll(".dest-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("dest-" + days[i].phase)?.classList.add("active");
  currentDay = i;
  window.scrollTo({ top: 0, behavior: "smooth" });
  nextNav?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

function switchView(view) {
  currentView = view;
  document.getElementById("btn-dates").classList.toggle("active", view === "dates");
  document.getElementById("btn-dests").classList.toggle("active", view === "dests");
  document.getElementById("view-dates").style.display = view === "dates" ? "" : "none";
  document.getElementById("view-dests").style.display = view === "dests" ? "" : "none";
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
  document.getElementById("hamburger").classList.toggle("open", sidebarOpen);
  document.getElementById("main").classList.toggle("expanded", !sidebarOpen);
  document.getElementById("overlay").classList.toggle("show", sidebarOpen && window.innerWidth < 768);
}

function closeSidebar() {
  sidebarOpen = false;
  document.getElementById("sidebar").classList.add("collapsed");
  document.getElementById("hamburger").classList.remove("open");
  document.getElementById("main").classList.add("expanded");
  document.getElementById("overlay").classList.remove("show");
}

async function initTrip() {
  const main = document.getElementById("main");
  main.innerHTML = '<p style="padding:48px 24px;color:var(--rock);font-size:15px;">Reisdata laden…</p>';
  try {
    const res = await fetch("trip-data.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    days = data.days;
    destinations = data.destinations;
    phaseGroups = data.phaseGroups;
    buildSidebar();
    buildMain();
    document.getElementById("sidebar").classList.add("collapsed");
    document.getElementById("main").classList.add("expanded");
  } catch (err) {
    main.innerHTML = '<p style="padding:48px 24px;color:#b91c1c;font-size:15px;">Kon reisdata niet laden. Probeer de pagina te verversen.</p>';
    console.error(err);
  }
}

initTrip();
</script>
</body>
</html>
